# ── Segurança global ──────────────────────────────────────
# (coloque em /etc/nginx/nginx.conf dentro do bloco http{})
# server_tokens off;

# Rate limiting — limita rajadas de requisições
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=geral:10m rate=60r/m;

# ── Chatbot — Produção ────────────────────────────────────
server {
    listen 80;
    server_name chatbot.indikolab.com;
    # certbot adiciona o redirect HTTPS e o bloco SSL automaticamente

    # Tamanho máximo do body (proteção contra upload malicioso)
    client_max_body_size 1m;

    # Timeout de proxy
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Headers de segurança
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Rota de webhook WhatsApp — rate limit separado
    location /api/whatsapp/webhook {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Rotas de API — rate limit moderado
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend
    location / {
        limit_req zone=geral burst=30 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Chatbot — Desenvolvimento ─────────────────────────────
